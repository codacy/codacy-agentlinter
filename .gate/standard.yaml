version: "1.0.0"
created_by: "gate-setup"

knowledge_spec:
  project_name: "codacy-agentlinter"
  languages: [typescript]
  frameworks: [codacy-seed, agentlinter]
  architecture: monolith
  build_system: npm
  test_framework: mocha

quality_dimensions:
  - id: comprehensibility
    description: "Code readable in one context load"
    signals:
      - metric: file_length
        threshold: 300
        unit: lines
        rationale: "AI context windows degrade on large files"
      - metric: cyclomatic_complexity
        threshold: 15
        unit: per_function
        rationale: "Complexity-aware feedback improves AI performance by 35.71%"
      - metric: function_length
        threshold: 50
        unit: lines
        rationale: "Short functions are easier for agents to modify safely"
      - metric: naming_quality
        tool: ai
        rationale: "Descriptive names improve AI comprehension by 2x"

  - id: modularity
    description: "Modify one concern without touching 3+ files"
    signals:
      - metric: single_responsibility
        tool: ai
        rationale: "AI performance drops sharply at 3+ files per change"
      - metric: shallow_abstractions
        tool: ai
        rationale: "LLMs struggle with deep inheritance hierarchies"

  - id: type_safety
    description: "Type system catches errors before runtime"
    signals:
      - metric: strict_types
        languages: [typescript]
        rationale: ">50% reduction in compilation errors with type constraints"
        rules_by_language:
          typescript:
            tool: eslint
            rules:
              - "@typescript-eslint/no-explicit-any"
              - "@typescript-eslint/explicit-function-return-type"

  - id: test_adequacy
    description: "Tests define expected behavior for agents"
    signals:
      - metric: test_coverage
        threshold: 80
        unit: percent
        ai_threshold: 90
        rationale: "90% recommended for AI-generated code"
      - metric: test_quality
        tool: ai
        rationale: "Tests are the primary safety net for AI agents"

security_patterns:
  - id: no-hardcoded-secrets
    description: "No secrets, API keys, passwords, or tokens in source code"
    severity: critical
    cwe: [CWE-798]
    enforced_by:
      - tool: Trivy
        config:
          scanners: [secret]

  - id: input-sanitization
    description: "All user input validated and sanitized before use"
    severity: critical
    cwe: [CWE-20, CWE-80, CWE-89, CWE-117]
    enforced_by: []

  - id: parameterized-queries
    description: "Database queries use parameters, never string concatenation"
    severity: critical
    cwe: [CWE-89]
    enforced_by: []

  - id: dependency-verification
    description: "No known-vulnerable dependencies"
    severity: high
    cwe: [CWE-1395]
    enforced_by:
      - tool: Trivy
        config:
          scanners: [vuln]
          severity: [HIGH, CRITICAL]

  - id: no-unsafe-deserialization
    description: "No unsafe deserialization of untrusted data"
    severity: high
    cwe: [CWE-502]
    enforced_by: []

  - id: access-control-checks
    description: "Authorization verified on all sensitive operations"
    severity: high
    cwe: [CWE-639]
    enforced_by: []

  - id: config-file-integrity
    description: "Configuration files not manipulable by untrusted input"
    severity: high
    cwe: [CWE-15]
    enforced_by:
      - tool: Trivy
        config:
          scanners: [config]

custom_patterns:
  - id: codacy-seed-engine-contract
    description: "All engine implementations must properly implement the codacy-seed BaseEngine interface"
    severity: high
    enforced_by: []
    rationale: "codacy-seed defines the contract for how analysis results are formatted and returned to Codacy; deviations break the integration"

  - id: tool-metadata-completeness
    description: "toolMetadata.ts must contain complete name, version, and patterns list before building"
    severity: high
    enforced_by: []
    rationale: "Incomplete metadata causes the Codacy platform to reject tool results at ingestion time"

  - id: doc-generator-pattern-sync
    description: "Pattern documentation generated by docGenerator.ts must stay in sync with the patterns defined in the tool metadata"
    severity: high
    enforced_by: []
    rationale: "Out-of-sync docs cause discrepancies between what Codacy UI shows and what the tool actually checks"

  - id: dockerfile-no-latest-tag
    description: "Dockerfile base images must pin to a specific version, not 'latest'"
    severity: high
    enforced_by:
      - tool: Trivy
        config:
          scanners: [config]
    rationale: "Unpinned images cause non-reproducible builds and can pull in breaking changes"

process_constraints:
  self_healing_limit: 2
  analysis_mode: lightweight
  exclude_paths:
    - node_modules
    - dist
    - build
    - .git
    - vendor
    - coverage

tool_configuration:
  trivy:
    enabled: true
